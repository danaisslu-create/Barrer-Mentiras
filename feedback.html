<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Los Hilos del Poder</title>
    <link rel="stylesheet" href="feedback.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Quicksand&family=Special+Elite&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1 class="title">✦ EXPEDIENTE DE OPINIÓN ✦</h1>
        <div class="feedback-card">
            <p class="intro">Cuéntanos qué otras opciones crees que pudo haber tomado Raúl. Además, ayúdanos a decidir el futuro de esta historia.</p>
            
            <form id="feedbackForm">
                <div class="form-group">
                    <label for="suggestions">💬 Otras opciones para Raúl:</label>
                    <textarea id="suggestions" rows="4" placeholder="Ej: Podría haber llamado a la prensa, o haber quemado la bolsa desde el principio..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>🎮 ¿En qué medio te gustaría seguir explorando esta historia?</label>
                    <div class="radio-group">
                        <label><input type="radio" name="medium" value="videojuego"> 🎮 Videojuego</label>
                        <label><input type="radio" name="medium" value="pelicula"> 🎬 Película</label>
                        <label><input type="radio" name="medium" value="podcast"> 🎧 Podcast</label>
                        <label><input type="radio" name="medium" value="otro"> 📖 Otro (especificar)</label>
                    </div>
                    <input type="text" id="otroMedium" placeholder="Especifica otro medio" style="display:none; margin-top:0.5rem;">
                </div>
                
                <button type="submit" class="submit-btn">Enviar opinión</button>
            </form>
            <div id="thanksMessage" class="thanks-message hidden">✨ ¡Gracias por tu colaboración! Tu opinión será archivada en el expediente. ✨</div>
        </div>
        <div class="actions">
            <button id="backToCredits" class="back-btn">◀ Volver a Créditos</button>
        </div>
    </div>
    <canvas id="threadCanvas"></canvas>
    <script src="feedback.js"></script>
</body>
</html>
